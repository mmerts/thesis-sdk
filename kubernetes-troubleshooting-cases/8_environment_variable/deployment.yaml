apiVersion: v1
kind: Pod
metadata:
  name: env-var-app
  labels:
    app: env-var-app
spec:
  containers:
  - name: env-var-app
    image: env-var-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 8080
    env:
    # WRONG: Only DATABASE_URL is defined, missing APP_MODE and API_KEY
    - name: DATABASE_URL
      value: "postgresql://db:5432/mydb"
    # Missing:
    # - name: APP_MODE
    #   value: "production"
    # - name: API_KEY
    #   value: "secret-key-here"
