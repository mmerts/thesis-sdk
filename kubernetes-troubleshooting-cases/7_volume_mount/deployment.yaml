apiVersion: v1
kind: Pod
metadata:
  name: volume-mount-app
  labels:
    app: volume-mount-app
spec:
  containers:
  - name: volume-mount-app
    image: volume-mount-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 8080
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
  volumes:
  - name: config-volume
    configMap:
      name: app-configuration  # WRONG: ConfigMap is named 'app-config', not 'app-configuration'
