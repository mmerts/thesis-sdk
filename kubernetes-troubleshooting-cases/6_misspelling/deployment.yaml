apiVersion: apps/v1
kind: Deployment
metadata:
  name: misspelling-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
        tier: fronted  # TYPO: Should be 'frontend'
        environment: production
    spec:
      containers:
      - name: myapp
        image: misspeling-app:latset
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: APP_NAME
          value: "MyApplicaton"  # TYPO: 'Application'
---
apiVersion: v1
kind: Service
metadata:
  name: misspelling-service
spec:
  selector:
    app: myapp
    tier: frontend  # MISMATCH: Looking for 'frontend', but pods have 'fronted'
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
