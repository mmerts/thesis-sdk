apiVersion: apps/v1
kind: Deployment
metadata:
  name: port-mismatch-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: port-mismatch-app
  template:
    metadata:
      labels:
        app: port-mismatch-app
    spec:
      containers:
      - name: port-mismatch-app
        image: port-mismatch-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080  # WRONG: Should be 5000
---
apiVersion: v1
kind: Service
metadata:
  name: port-mismatch-service
spec:
  selector:
    app: port-mismatch-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000  # WRONG: Should be 5000
  type: LoadBalancer
