apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-v1
  template:
    metadata:
      labels:
        app: myapp-v1  # MISMATCH: Service looks for 'myapp' but pods have 'myapp-v1'
        tier: frontend
    spec:
      containers:
      - name: myapp
        image: incorrect-selector-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  selector:
    app: myapp  # MISMATCH: Looking for 'myapp' but pods have 'myapp-v1'
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
