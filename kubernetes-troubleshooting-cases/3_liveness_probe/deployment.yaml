apiVersion: v1
kind: Pod
metadata:
  name: liveness-probe-app
  labels:
    app: liveness-probe-app
spec:
  containers:
  - name: liveness-probe-app
    image: liveness-probe-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 8080
    livenessProbe:
      httpGet:
        path: /health  # WRONG: This endpoint doesn't exist!
        port: 8080
      initialDelaySeconds: 3
      periodSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /ready  # This one exists, so it works
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 3
