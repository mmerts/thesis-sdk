apiVersion: v1
kind: Pod
metadata:
  name: wrong-port-app
  labels:
    app: wrong-port-app
spec:
  containers:
  - name: wrong-port-app
    image: wrong-port-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 8000  # WRONG: Should be 8765
---
apiVersion: v1
kind: Service
metadata:
  name: wrong-port-service
spec:
  selector:
    app: wrong-port-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000  # WRONG: Should be 8765
